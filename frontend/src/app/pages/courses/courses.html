<app-navbar></app-navbar>

<div class="page-content">

  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <!-- Form Section -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">{{ editingCourseId ? 'Update Course' : 'Add Course' }}</h3>
      <button *ngIf="editingCourseId" class="btn btn-secondary btn-sm" (click)="cancelEdit()">
        Cancel Edit
      </button>
    </div>

    <div class="form-row">
      <div class="form-field">
        <input
          class="form-control"
          placeholder="Course Code"
          [(ngModel)]="code"
          [disabled]="editingCourseId !== null"
        />
      </div>

      <div class="form-field">
        <input
          class="form-control"
          placeholder="Course Title"
          [(ngModel)]="title"
        />
      </div>

      <div class="form-field">
        <input
          class="form-control"
          placeholder="Description"
          [(ngModel)]="description"
        />
      </div>

      <div class="form-field form-field--sm">
        <input
          type="number"
          class="form-control"
          placeholder="Duration (days)"
          [(ngModel)]="duration_days"
        />
      </div>

      <div class="form-field form-field--action">
        <button *ngIf="!editingCourseId" class="btn btn-primary" (click)="addCourse()">Add</button>
        <button *ngIf="editingCourseId" class="btn btn-warning" (click)="updateCourse()">Update</button>
      </div>
    </div>
  </div>

  <!-- Table Section -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">Course List</h3>
      <span class="record-count">{{ courses.length }} records</span>
    </div>

    <div class="table-wrapper">
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Title</th>
            <th>Description</th>
            <th>Duration Days</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let course of courses">
            <td>{{ course.id }}</td>
            <td><strong>{{ course.code }}</strong></td>
            <td>{{ course.title }}</td>
            <td>{{ course.description }}</td>
            <td>{{ course.duration_days }}</td>
            <td class="actions-cell">
              <button class="btn btn-sm btn-outline-primary" (click)="editCourse(course)">Edit</button>
              <button class="btn btn-sm btn-danger" (click)="deleteCourse(course.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
