<nav class="app-navbar">
  <div class="navbar-inner">

      <span class="brand-icon">FMS</span>
      <span class="brand-text">Feedback Management</span>
    </a>

    <button class="navbar-toggle" (click)="toggleMenu()">
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
    </button>

    <div class="navbar-links" [class.open]="menuOpen">

      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active-link" (click)="closeMenu()">
        Dashboard
      </a>

      <a class="nav-link" routerLink="/courses" routerLinkActive="active-link" *ngIf="role === 'ADMIN'" (click)="closeMenu()">
        Courses
      </a>

      <a class="nav-link" routerLink="/faculty" routerLinkActive="active-link" *ngIf="role === 'ADMIN'" (click)="closeMenu()">
        Faculty
      </a>

      <a class="nav-link" routerLink="/students" routerLinkActive="active-link" *ngIf="role === 'ADMIN'" (click)="closeMenu()">
        Students
      </a>

      <a class="nav-link" routerLink="/programs" routerLinkActive="active-link" *ngIf="role === 'ADMIN' || role === 'COORDINATOR'" (click)="closeMenu()">
        Programs
      </a>

      <a class="nav-link" routerLink="/enrollments" routerLinkActive="active-link" *ngIf="role === 'ADMIN' || role === 'COORDINATOR'" (click)="closeMenu()">
        Enrollments
      </a>

      <a class="nav-link" routerLink="/attendance" routerLinkActive="active-link" *ngIf="role === 'COORDINATOR'" (click)="closeMenu()">
        Attendance
      </a>

      <a class="nav-link" routerLink="/feedback" routerLinkActive="active-link" *ngIf="role === 'PARTICIPANT' || role === 'ADMIN'" (click)="closeMenu()">
        Feedback
      </a>

      <a class="nav-link" routerLink="/reports" routerLinkActive="active-link" *ngIf="role === 'ADMIN' || role === 'COORDINATOR'" (click)="closeMenu()">
        Reports
      </a>

    </div>

    <div class="navbar-actions">
      <span class="user-role">{{ role }}</span>

          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
