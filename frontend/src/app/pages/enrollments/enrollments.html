<app-navbar></app-navbar>

<div class="page-content">

  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <!-- Enroll Form -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">Enroll Student</h3>
    </div>

    <div class="form-row">
      <div class="form-field">
        <select class="form-select" [(ngModel)]="student_id">
          <option [ngValue]="null">Select Student</option>
          <option *ngFor="let student of students" [ngValue]="student.id">
            {{ student.name }} - {{ student.email }}
          </option>
        </select>
      </div>

      <div class="form-field">
        <select class="form-select" [(ngModel)]="program_id">
          <option [ngValue]="null">Select Program</option>
          <option *ngFor="let program of programs" [ngValue]="program.id">
            Program {{ program.id }} - {{ program.course }} - {{ program.location }}
          </option>
        </select>
      </div>

      <div class="form-field form-field--action">
        <button class="btn btn-primary" (click)="enrollStudent()">Enroll</button>
      </div>
    </div>
  </div>

  <!-- Enrollment List -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">Enrollment List</h3>
      <span class="record-count">{{ enrollments.length }} records</span>
    </div>

    <div class="table-wrapper">
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>Enrollment ID</th>
            <th>Student</th>
            <th>Program ID</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let enrollment of enrollments">
            <td>{{ enrollment.id }}</td>
            <td><strong>{{ enrollment.student }}</strong></td>
            <td>{{ enrollment.program_id }}</td>
            <td>{{ enrollment.course }}</td>
            <td class="actions-cell">
              <button class="btn btn-sm btn-danger" (click)="deleteEnrollment(enrollment.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
