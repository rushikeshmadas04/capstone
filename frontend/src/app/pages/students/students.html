<app-navbar></app-navbar>

<div class="page-content">

  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <!-- Form Section -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">{{ editingStudentId ? 'Update Student' : 'Add Student' }}</h3>
      <button *ngIf="editingStudentId" class="btn btn-secondary btn-sm" (click)="cancelEdit()">
        Cancel Edit
      </button>
    </div>

    <div class="form-row">
      <div class="form-field form-field--lg">
        <input
          class="form-control"
          placeholder="Registered Participant Email"
          [(ngModel)]="email"
          [disabled]="editingStudentId !== null"
        />
      </div>

      <div class="form-field">
        <select class="form-select" [(ngModel)]="course_id">
          <option [ngValue]="null">Select Course</option>
          <option *ngFor="let course of courses" [ngValue]="course.id">
            {{ course.title }}
          </option>
        </select>
      </div>

      <div class="form-field form-field--action">
        <button *ngIf="!editingStudentId" class="btn btn-primary" (click)="addStudent()">Add</button>
        <button *ngIf="editingStudentId" class="btn btn-warning" (click)="updateStudent()">Update</button>
      </div>
    </div>
  </div>

  <!-- Table Section -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">Student List</h3>
      <span class="record-count">{{ students.length }} records</span>
    </div>

    <div class="table-wrapper">
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let student of students">
            <td>{{ student.id }}</td>
            <td><strong>{{ student.name }}</strong></td>
            <td>{{ student.email }}</td>
            <td>{{ student.course?.title || student.course_id || 'N/A' }}</td>
            <td class="actions-cell">
              <button class="btn btn-sm btn-outline-primary" (click)="editStudent(student)">Edit</button>
              <button class="btn btn-sm btn-danger" (click)="deleteStudent(student.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
