services:
  backend:
    build: ./backend
    container_name: feedback-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/instance:/app/instance
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: feedback-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
