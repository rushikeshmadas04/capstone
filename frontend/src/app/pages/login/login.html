<div class="login-wrapper">
  <div class="login-container">

    <div class="login-brand">
      <div class="brand-mark">FMS</div>
      <h1 class="login-title">Feedback Management</h1>
      <p class="login-tagline">Training &amp; Feedback Portal</p>
    </div>

    <div class="login-card">

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <!-- Login Form -->
      <div *ngIf="!showRegister">
        <div class="form-group">
          <label class="form-label">Sign in as</label>
          <select class="form-select" [(ngModel)]="role">
            <option value="ADMIN">Administrator</option>
            <option value="COORDINATOR">Coordinator</option>
            <option value="PARTICIPANT">Participant</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            placeholder="you@example.com"
            [(ngModel)]="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Enter your password"
            [(ngModel)]="password"
          />
        </div>

        <button class="btn btn-primary login-btn" (click)="loginUser()">
          Sign In
        </button>

        <div class="login-footer">
          <span>New user?</span>
          <button class="btn-link" (click)="showRegister = true">
            Create an account
          </button>
        </div>
      </div>

      <!-- Register Form -->
      <div *ngIf="showRegister">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter your name"
            [(ngModel)]="registerName"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            placeholder="you@example.com"
            [(ngModel)]="registerEmail"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Choose a password"
            [(ngModel)]="registerPassword"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select" [(ngModel)]="registerRole">
            <option value="ADMIN">Administrator</option>
            <option value="COORDINATOR">Coordinator</option>
            <option value="PARTICIPANT">Participant</option>
          </select>
        </div>

        <button class="btn btn-primary login-btn" (click)="registerUser()">
          Create Account
        </button>

        <div class="login-footer">
          <span>Already registered?</span>
          <button class="btn-link" (click)="showRegister = false">
            Sign in
          </button>
        </div>
      </div>

    </div>

    <p class="login-copyright">
      &copy; 2026 Feedback Management System
    </p>

  </div>
</div>
