<app-navbar></app-navbar>

<div class="page-content">

  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <!-- Faculty Form -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">{{ editingFacultyId ? 'Update Faculty' : 'Add Faculty' }}</h3>
      <button *ngIf="editingFacultyId" class="btn btn-secondary btn-sm" (click)="cancelEdit()">
        Cancel Edit
      </button>
    </div>

    <div class="form-row">
      <div class="form-field">
        <input
          class="form-control"
          placeholder="Faculty Name"
          [(ngModel)]="name"
        />
      </div>

      <div class="form-field">
        <input
          class="form-control"
          placeholder="Faculty Email"
          [(ngModel)]="email"
        />
      </div>

      <div class="form-field form-field--action">
        <button *ngIf="!editingFacultyId" class="btn btn-primary" (click)="addFaculty()">Add</button>
        <button *ngIf="editingFacultyId" class="btn btn-warning" (click)="updateFaculty()">Update</button>
      </div>
    </div>
  </div>

  <!-- Skill Management -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">Skill Management</h3>
    </div>

    <div class="form-row" style="margin-bottom: var(--space-4)">
      <div class="form-field">
        <input
          class="form-control"
          placeholder="Skill Name"
          [(ngModel)]="skillName"
        />
      </div>
      <div class="form-field form-field--action">
        <button class="btn btn-primary" (click)="addSkill()">Add Skill</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <select class="form-select" [(ngModel)]="facultyId">
          <option [ngValue]="null">Select Faculty</option>
          <option *ngFor="let faculty of faculties" [ngValue]="faculty.id">
            {{ faculty.name }}
          </option>
        </select>
      </div>

      <div class="form-field">
        <select class="form-select" [(ngModel)]="skillId">
          <option [ngValue]="null">Select Skill</option>
          <option *ngFor="let skill of skills" [ngValue]="skill.id">
            {{ skill.name }}
          </option>
        </select>
      </div>

      <div class="form-field form-field--action">
        <button class="btn btn-warning" (click)="assignSkill()">Assign</button>
      </div>
    </div>
  </div>

  <!-- Faculty List -->
  <div class="section-card">
    <div class="section-header">
      <h3 class="section-title">Faculty List</h3>
      <span class="record-count">{{ faculties.length }} records</span>
    </div>

    <div class="search-bar">
      <input
        class="form-control"
        placeholder="Search by skill..."
        [(ngModel)]="searchSkill"
      />
      <button class="btn btn-dark" (click)="searchFaculty()">Search</button>
    </div>

    <div class="table-wrapper">
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Skills</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let faculty of faculties">
            <td>{{ faculty.id }}</td>
            <td><strong>{{ faculty.name }}</strong></td>
            <td>{{ faculty.email }}</td>
            <td>
              <span
                class="skill-tag"
                *ngFor="let skill of faculty.skills">
                {{ skill.name }}
              </span>
            </td>
            <td class="actions-cell">
              <button class="btn btn-sm btn-outline-primary" (click)="editFaculty(faculty)">Edit</button>
              <button class="btn btn-sm btn-danger" (click)="deleteFaculty(faculty.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
